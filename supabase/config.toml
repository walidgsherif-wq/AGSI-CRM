# Supabase local dev config.
# Ref: https://supabase.com/docs/guides/cli/config

project_id = "agsi-crm"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = false                  # Admin-invite only per §2
enable_confirmations = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[[storage.buckets]]
name = "bnc-uploads"
public = false
file_size_limit = "50MiB"
allowed_mime_types = [
  "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
  "application/vnd.ms-excel",
]

[[storage.buckets]]
name = "documents"
public = false
file_size_limit = "25MiB"

[[storage.buckets]]
name = "evidence"
public = false
file_size_limit = "25MiB"

[[storage.buckets]]
name = "leadership-reports"
public = false
file_size_limit = "25MiB"

[analytics]
enabled = false
